<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2B2118" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9A8468"/>
    </marker>
  </defs>

  <!-- figure background (matches the card frame) -->
  <rect x="0" y="0" width="1040" height="520" fill="#F6EEE2"/>

  <!-- title -->
  <text x="40" y="50" font-size="22" font-weight="700" fill="#2B2118">FinSight AI</text>
  <text x="40" y="74" font-size="14" fill="#7A6A58">Multi-modal short-term movement prediction pipeline</text>

  <!-- stage labels -->
  <g font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#A2917C">
    <text x="40" y="128">DATA</text>
    <text x="240" y="128">PROCESS</text>
    <text x="452" y="128">MODEL</text>
    <text x="664" y="128">EVALUATE</text>
    <text x="852" y="128">SERVE</text>
  </g>

  <!-- ===================== main spine ===================== -->
  <!-- arrows (drawn first, behind boxes) -->
  <g stroke="#C9B79D" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="208" y1="196" x2="234" y2="196"/>
    <line x1="420" y1="196" x2="446" y2="196"/>
    <line x1="632" y1="196" x2="658" y2="196"/>
    <line x1="820" y1="196" x2="846" y2="196"/>
  </g>

  <!-- N1 Data -->
  <g filter="url(#soft)">
    <rect x="40" y="148" width="168" height="96" rx="14" fill="#F4ECDF" stroke="#E5D6C3" stroke-width="1.5"/>
  </g>
  <text x="124" y="188" text-anchor="middle" font-size="15" font-weight="600" fill="#2B2118">Data sources</text>
  <text x="124" y="210" text-anchor="middle" font-size="11.5" fill="#7A6A58">OHLCV prices</text>
  <text x="124" y="226" text-anchor="middle" font-size="11.5" fill="#7A6A58">news · filings</text>

  <!-- N2 Features -->
  <g filter="url(#soft)">
    <rect x="240" y="148" width="180" height="96" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/>
  </g>
  <text x="330" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#2B2118">Features</text>
  <text x="330" y="206" text-anchor="middle" font-size="11.5" fill="#7A6A58">technical indicators</text>
  <text x="330" y="222" text-anchor="middle" font-size="11.5" fill="#7A6A58">+ FinBERT sentiment</text>

  <!-- N3 Models -->
  <g filter="url(#soft)">
    <rect x="452" y="148" width="180" height="96" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/>
  </g>
  <text x="542" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#2B2118">Models</text>
  <text x="542" y="206" text-anchor="middle" font-size="11.5" fill="#7A6A58">LogReg · RF · LightGBM</text>
  <text x="542" y="222" text-anchor="middle" font-size="11.5" fill="#7A6A58">LSTM · GRU · Transformer</text>

  <!-- N4 Evaluate -->
  <g filter="url(#soft)">
    <rect x="664" y="148" width="156" height="96" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/>
  </g>
  <text x="742" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#2B2118">Evaluation</text>
  <text x="742" y="206" text-anchor="middle" font-size="11.5" fill="#7A6A58">macro-F1 · SHAP</text>
  <text x="742" y="222" text-anchor="middle" font-size="11.5" fill="#7A6A58">backtest vs B&amp;H</text>

  <!-- N5 Dashboard (accent) -->
  <g filter="url(#soft)">
    <rect x="846" y="148" width="158" height="96" rx="14" fill="#5B4636" stroke="#4A382B" stroke-width="1.5"/>
  </g>
  <text x="925" y="184" text-anchor="middle" font-size="15" font-weight="600" fill="#FBF3E4">Streamlit</text>
  <text x="925" y="202" text-anchor="middle" font-size="15" font-weight="600" fill="#FBF3E4">dashboard</text>
  <text x="925" y="224" text-anchor="middle" font-size="11.5" fill="#E0CBA8">live signals + Q&amp;A</text>

  <!-- ===================== RAG lane ===================== -->
  <text x="240" y="332" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#A2917C">RETRIEVAL-AUGMENTED Q&amp;A</text>

  <!-- elbow from Data down into RAG lane -->
  <path d="M124,244 L124,392 L234,392" stroke="#C9B79D" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <!-- RAG arrows -->
  <g stroke="#C9B79D" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="420" y1="392" x2="446" y2="392"/>
    <line x1="632" y1="392" x2="658" y2="392"/>
  </g>
  <!-- R3 up into dashboard -->
  <path d="M820,392 L925,392 L925,248" stroke="#C9B79D" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <!-- R1 -->
  <g filter="url(#soft)">
    <rect x="240" y="356" width="180" height="74" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/>
  </g>
  <text x="330" y="388" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2B2118">Chunk + embed</text>
  <text x="330" y="408" text-anchor="middle" font-size="11.5" fill="#7A6A58">filings → vectors</text>

  <!-- R2 -->
  <g filter="url(#soft)">
    <rect x="452" y="356" width="180" height="74" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/>
  </g>
  <text x="542" y="388" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2B2118">Vector store</text>
  <text x="542" y="408" text-anchor="middle" font-size="11.5" fill="#7A6A58">similarity search</text>

  <!-- R3 -->
  <g filter="url(#soft)">
    <rect x="664" y="356" width="156" height="74" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/>
  </g>
  <text x="742" y="388" text-anchor="middle" font-size="13.5" font-weight="600" fill="#2B2118">Document Q&amp;A</text>
  <text x="742" y="408" text-anchor="middle" font-size="11.5" fill="#7A6A58">grounded answers</text>

  <!-- footer note -->
  <text x="40" y="486" font-size="11" fill="#A2917C">Reproducible pipeline · single config · unit tests · Docker · CI</text>
</svg>
