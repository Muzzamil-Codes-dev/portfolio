<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2B2118" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9A8468"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1040" height="520" fill="#F6EEE2"/>

  <!-- title -->
  <text x="40" y="50" font-size="22" font-weight="700" fill="#2B2118">NLP Retrieval &amp; RAG</text>
  <text x="40" y="74" font-size="14" fill="#7A6A58">Retrieval-augmented question answering over Natural Questions</text>

  <!-- ===================== INDEXING lane (offline) ===================== -->
  <text x="44" y="128" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#A2917C">INDEXING · OFFLINE</text>

  <!-- indexing arrows -->
  <g stroke="#C9B79D" stroke-width="2.5" fill="none" marker-end="url(#arrow2)">
    <line x1="214" y1="192" x2="240" y2="192"/>
    <line x1="412" y1="192" x2="438" y2="192"/>
    <line x1="610" y1="192" x2="636" y2="192"/>
  </g>

  <!-- Documents -->
  <g filter="url(#soft2)"><rect x="44" y="148" width="170" height="88" rx="14" fill="#F4ECDF" stroke="#E5D6C3" stroke-width="1.5"/></g>
  <text x="129" y="186" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2B2118">Documents</text>
  <text x="129" y="207" text-anchor="middle" font-size="11.5" fill="#7A6A58">Wikipedia passages</text>

  <!-- Preprocessing -->
  <g filter="url(#soft2)"><rect x="242" y="148" width="170" height="88" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/></g>
  <text x="327" y="186" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2B2118">Preprocessing</text>
  <text x="327" y="207" text-anchor="middle" font-size="11.5" fill="#7A6A58">clean · chunk · tokenize</text>

  <!-- Embeddings -->
  <g filter="url(#soft2)"><rect x="440" y="148" width="170" height="88" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/></g>
  <text x="525" y="186" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2B2118">Embeddings</text>
  <text x="525" y="207" text-anchor="middle" font-size="11.5" fill="#7A6A58">sentence encoder</text>

  <!-- Vector DB (the hub) -->
  <g filter="url(#soft2)"><rect x="638" y="148" width="170" height="88" rx="14" fill="#EAD9BF" stroke="#D8C3A2" stroke-width="1.5"/></g>
  <text x="723" y="186" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2B2118">Vector DB</text>
  <text x="723" y="207" text-anchor="middle" font-size="11.5" fill="#6F6049">FAISS index</text>

  <!-- connector: vector store feeds the retriever -->
  <path d="M723,236 V300 H303 V346" stroke="#C9B79D" stroke-width="2.5" fill="none" marker-end="url(#arrow2)"/>
  <text x="540" y="292" text-anchor="middle" font-size="11" fill="#A2917C">nearest-neighbour search</text>

  <!-- ===================== QUERY lane (online) ===================== -->
  <text x="44" y="332" font-size="10.5" font-weight="600" letter-spacing="1.2" fill="#A2917C">QUERY · ONLINE</text>

  <!-- query arrows -->
  <g stroke="#C9B79D" stroke-width="2.5" fill="none" marker-end="url(#arrow2)">
    <line x1="194" y1="394" x2="226" y2="394"/>
    <line x1="378" y1="394" x2="410" y2="394"/>
    <line x1="562" y1="394" x2="594" y2="394"/>
    <line x1="746" y1="394" x2="778" y2="394"/>
  </g>

  <!-- Query -->
  <g filter="url(#soft2)"><rect x="44" y="350" width="150" height="88" rx="14" fill="#F4ECDF" stroke="#E5D6C3" stroke-width="1.5"/></g>
  <text x="119" y="388" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2B2118">Query</text>
  <text x="119" y="409" text-anchor="middle" font-size="11.5" fill="#7A6A58">user question</text>

  <!-- Retriever -->
  <g filter="url(#soft2)"><rect x="228" y="350" width="150" height="88" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/></g>
  <text x="303" y="382" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2B2118">Retriever</text>
  <text x="303" y="402" text-anchor="middle" font-size="11.5" fill="#7A6A58">TF-IDF + dense</text>
  <text x="303" y="418" text-anchor="middle" font-size="11.5" fill="#7A6A58">top-k</text>

  <!-- Re-ranker -->
  <g filter="url(#soft2)"><rect x="412" y="350" width="150" height="88" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/></g>
  <text x="487" y="382" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2B2118">Re-ranker</text>
  <text x="487" y="402" text-anchor="middle" font-size="11.5" fill="#7A6A58">cross-encoder</text>
  <text x="487" y="418" text-anchor="middle" font-size="11.5" fill="#7A6A58">re-scores top-k</text>

  <!-- LLM -->
  <g filter="url(#soft2)"><rect x="596" y="350" width="150" height="88" rx="14" fill="#FFFFFF" stroke="#E5D6C3" stroke-width="1.5"/></g>
  <text x="671" y="388" text-anchor="middle" font-size="14.5" font-weight="600" fill="#2B2118">LLM</text>
  <text x="671" y="409" text-anchor="middle" font-size="11.5" fill="#7A6A58">Flan-T5 generation</text>

  <!-- Answer (accent) -->
  <g filter="url(#soft2)"><rect x="780" y="350" width="174" height="88" rx="14" fill="#5B4636" stroke="#4A382B" stroke-width="1.5"/></g>
  <text x="867" y="388" text-anchor="middle" font-size="14.5" font-weight="600" fill="#FBF3E4">Answer</text>
  <text x="867" y="409" text-anchor="middle" font-size="11.5" fill="#E0CBA8">grounded + citations</text>

  <!-- footer note -->
  <text x="44" y="486" font-size="11" fill="#A2917C">Evaluated with recall@k · MRR — dense + cross-encoder beat the TF-IDF baseline</text>
</svg>
